<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 04 Cryptography Toolkit</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0b0f19;
            --bg-surface: #111827;
            --bg-surface-elevated: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --accent-1: #6366f1; /* Indigo */
            --accent-2: #8b5cf6; /* Violet */
            --accent-3: #10b981; /* Emerald */
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1rem;
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
        }

        .container { width: 100%; max-width: 1300px; }

        header { text-align: center; margin-bottom: 3rem; }

        h1 {
            font-size: 3rem; font-weight: 700;
            background: linear-gradient(135deg, #a5b4fc, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle { font-size: 1.125rem; color: var(--text-secondary); }

        /* Tabs */
        .tabs { display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; }
        .tab-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
            color: var(--text-secondary); padding: 0.75rem 2rem; border-radius: 9999px; font-size: 1rem;
            cursor: pointer; transition: all 0.3s; backdrop-filter: blur(10px);
        }
        .tab-btn:hover { background: rgba(255, 255, 255, 0.08); color: var(--text-primary); }
        .tab-btn.active {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: white; border-color: transparent;
        }

        .panel { display: none; width: 100%; }
        .panel.active { display: block; animation: fadeInScale 0.4s ease-out forwards; }

        .card {
            background: rgba(17, 24, 39, 0.8);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            backdrop-filter: blur(20px);
        }

        label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; color: var(--text-secondary); font-weight: 500; }
        
        input, textarea {
            width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border);
            color: var(--text-primary); border-radius: 0.5rem; padding: 0.75rem; transition: all 0.3s ease;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--accent-1); }

        button.action-btn {
            background: var(--bg-surface-elevated); color: var(--text-primary);
            border: 1px solid var(--border); padding: 0.75rem 1.5rem; border-radius: 0.5rem;
            font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
            width: 100%; margin-top: 1rem;
        }
        button.action-btn.primary { background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); border: none; }
        button.action-btn:hover { filter: brightness(1.2); }

        .code-box {
            background: rgba(0, 0, 0, 0.5); border: 1px dashed var(--border);
            padding: 1rem; border-radius: 0.5rem; font-family: monospace; font-size: 0.85rem;
            color: var(--text-secondary); word-break: break-all; min-height: 40px;
            overflow-y: auto;
        }

        /* Server / Client Layout */
        .chat-section { display: flex; flex-direction: column; gap: 2rem; }
        .server-box { border: 2px solid var(--accent-3); }
        .clients-grid { display: flex; flex-wrap: wrap; gap: 1.5rem; justify-content: center; }
        .client-card { width: 350px; flex-shrink: 0; display: flex; flex-direction: column; }
        .chat-log { 
            height: 200px; background: rgba(0,0,0,0.4); border-radius: 0.5rem; 
            padding: 0.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .chat-msg { padding: 0.5rem; border-radius: 0.5rem; font-size: 0.85rem; border-left: 3px solid var(--accent-1); background: rgba(255,255,255,0.02);}
        .chat-msg.me { border-left: none; border-right: 3px solid var(--accent-3); background: rgba(16, 185, 129, 0.05); text-align: right; }
        .msg-enc { font-size: 0.65rem; color: var(--text-secondary); font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; margin-top: 0.25rem;}

        /* Animations */
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .spinner { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Lab 04 Cryptography Toolkit</h1>
        <p class="subtitle">Multi-Client Socket Chat Simulation via AES/RSA ∙ Diffie-Hellman ∙ SHA-256</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('aes')">AES-RSA Socket Chat</button>
        <button class="tab-btn" onclick="switchTab('dh')">Diffie-Hellman</button>
        <button class="tab-btn" onclick="switchTab('sha256')">SHA Hashing (256/3)</button>
    </div>

    <!-- PART 1: AES-RSA CHAT SIMULATION -->
    <div id="aes" class="panel active">
        <div class="chat-section">
            
            <!-- SERVER NODE -->
            <div class="card server-box">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3 style="color: var(--accent-3);">🖥️ Server Node</h3>
                    <div style="display: flex; gap: 1rem;">
                        <button class="action-btn primary" onclick="startServer()" id="btn-start" style="margin: 0; width: auto; background: var(--accent-3);">🚀 Start Server</button>
                        <button class="action-btn" onclick="addClient()" id="btn-add" style="margin: 0; width: auto; display: none;">+ Add Client</button>
                    </div>
                </div>
                <label>Server Terminal Logs (Decrypted view & events)</label>
                <div id="server-logs" class="code-box" style="height: 150px; font-size: 0.75rem; color: #a7f3d0;">
                    Waiting for server to start...
                </div>
            </div>

            <!-- CLIENT NODES -->
            <div class="clients-grid" id="clients-container">
                <!-- Clients will be injected here -->
            </div>
            
        </div>
    </div>

    <!-- PART 2: DIFFIE HELLMAN -->
    <div id="dh" class="panel card">
        <h2 style="margin-bottom: 2rem;">Diffie-Hellman Key Exchange Simulator</h2>
        <button class="action-btn primary" onclick="simulateDH()" id="btn-dh" style="margin-bottom: 2rem; max-width: 300px;">
            Run Full Exchange Cycle ⚡
        </button>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; display: none;" id="dh-results">
            <div>
                <h3 style="color: var(--accent-1); margin-bottom: 1rem;">Alice</h3>
                <label>Alice's Public Key</label>
                <textarea id="dh-alice-pub" rows="4" readonly class="code-box"></textarea>
                <label style="margin-top: 1rem;">Derived Shared Secret</label>
                <div id="dh-alice-sec" class="code-box" style="color: var(--accent-3);"></div>
            </div>

            <div>
                <h3 style="color: var(--accent-2); margin-bottom: 1rem;">Bob</h3>
                <label>Bob's Public Key</label>
                <textarea id="dh-bob-pub" rows="4" readonly class="code-box"></textarea>
                <label style="margin-top: 1rem;">Derived Shared Secret</label>
                <div id="dh-bob-sec" class="code-box" style="color: var(--accent-3);"></div>
            </div>
        </div>
    </div>

    <!-- PART 3: SHA-256 & SHA-3 -->
    <div id="sha256" class="panel card">
        <h2 style="margin-bottom: 2rem;">Multi-Algorithm Hashing Tool</h2>
        <div class="form-group">
            <label>Input Text (Real-time Hashing)</label>
            <textarea id="hash-input" placeholder="Type anything to see its digital fingerprint..." oninput="hashData()" rows="4"></textarea>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>SHA-256 Digest (Hex)</label>
                <div id="hash-output" class="code-box" style="font-size: 1rem; color: var(--accent-1);">Waiting for input...</div>
            </div>
            <div class="form-group">
                <label>SHA-3 (Keccak) Digest (Hex)</label>
                <div id="hash-output-3" class="code-box" style="font-size: 1rem; color: var(--accent-2);">Waiting for input...</div>
            </div>
        </div>
    </div>

</div>

<script>
    function switchTab(tabId) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
    }

    // --- SHA-256 & SHA-3 ---
    let hashTimeout;
    async function hashData() {
        clearTimeout(hashTimeout);
        hashTimeout = setTimeout(async () => {
            const text = document.getElementById('hash-input').value;
            if(!text) { 
                document.getElementById('hash-output').innerText = "Waiting for input..."; 
                document.getElementById('hash-output-3').innerText = "Waiting for input..."; 
                return; 
            }
            fetch('/api/sha256/hash', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({data: text})
            }).then(res => res.json()).then(data => {
                if(data.success) document.getElementById('hash-output').innerText = data.hash;
            });
            fetch('/api/sha3/hash', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({data: text})
            }).then(res => res.json()).then(data => {
                if(data.success) document.getElementById('hash-output-3').innerText = data.hash;
            });
        }, 300);
    }

    // --- DIFFIE HELLMAN ---
    async function simulateDH() {
        const btn = document.getElementById('btn-dh');
        btn.innerText = "Computing DH Exchange...";
        try {
            const res = await fetch('/api/dh/simulate');
            const data = await res.json();
            if(data.success) {
                document.getElementById('dh-alice-pub').value = data.alice_public_key;
                document.getElementById('dh-bob-pub').value = data.bob_public_key;
                document.getElementById('dh-alice-sec').innerText = data.alice_shared_secret;
                document.getElementById('dh-bob-sec').innerText = data.bob_shared_secret;
                document.getElementById('dh-results').style.display = 'grid';
            }
        } catch(e) { alert("Error"); }
        btn.innerText = "Run Full Exchange Cycle ⚡";
    }

    // --- AES-RSA CHAT SIMULATION ---
    let chatInterval = null;
    
    async function startServer() {
        await fetch('/api/chat/start_server', {method: 'POST'});
        document.getElementById('btn-start').style.display = 'none';
        document.getElementById('btn-add').style.display = 'inline-block';
        if(!chatInterval) chatInterval = setInterval(pollChatState, 1000);
        pollChatState();
    }

    async function addClient() {
        await fetch('/api/chat/add_client', {method: 'POST'});
        pollChatState();
    }

    async function sendMessage(clientId) {
        const inputFrame = document.getElementById(`input-${clientId}`);
        const msg = inputFrame.value;
        if(!msg) return;
        
        inputFrame.value = '';
        await fetch('/api/chat/send', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({client_id: clientId, message: msg})
        });
        pollChatState();
    }

    let globalMessagesCount = 0;
    
    async function pollChatState() {
        const res = await fetch('/api/chat/state');
        const state = await res.json();
        
        if(!state.is_running) return;

        // Render Server Logs
        const logsBox = document.getElementById('server-logs');
        logsBox.innerHTML = state.server_logs.join('<br>');
        logsBox.scrollTop = logsBox.scrollHeight;

        // Render Clients
        const container = document.getElementById('clients-container');
        
        state.clients.forEach(clientId => {
            if(!document.getElementById(`card-${clientId}`)) {
                const card = document.createElement('div');
                card.className = 'card client-card';
                card.id = `card-${clientId}`;
                card.innerHTML = `
                    <h4 style="color:var(--accent-1); margin-bottom:1rem;">🧑‍💻 ${clientId}</h4>
                    <div class="chat-log" id="log-${clientId}"></div>
                    <div style="display:flex; gap:0.5rem;">
                        <input type="text" id="input-${clientId}" placeholder="Message..." onkeypress="if(event.key==='Enter') sendMessage('${clientId}')">
                        <button class="action-btn primary" style="margin:0; width:80px; padding:0;" onclick="sendMessage('${clientId}')">Send</button>
                    </div>
                `;
                container.appendChild(card);
            }

            // Sync messages for this client
            const logElement = document.getElementById(`log-${clientId}`);
            logElement.innerHTML = '';
            
            state.global_messages.forEach(msgRecord => {
                const isMe = msgRecord.from === clientId;
                const html = document.createElement('div');
                html.className = isMe ? 'chat-msg me' : 'chat-msg';
                
                // If it's sent by me, I know the raw. If it's sent by someone else, I received the encrypted AES payload.
                const rawText = msgRecord.raw;
                const encryptedHex = msgRecord.deliveries[clientId];
                
                // We just show the clean decrypted message text without AES payloads below it
                if(isMe) {
                    html.innerHTML = `<strong>Me:</strong> ${rawText}`;
                } else {
                    html.innerHTML = `<strong>${msgRecord.from}:</strong> ${rawText}`;
                }
                logElement.appendChild(html);
            });
            logElement.scrollTop = logElement.scrollHeight;
        });
    }

</script>
</body>
</html>
