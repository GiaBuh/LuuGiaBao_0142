<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoSuite | Caesar Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
<canvas id="matrix-bg" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;"></canvas>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <i class="fa-solid fa-user-secret me-2"></i>CryptoSuite
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html"><i class="fa-solid fa-home me-1"></i>Home</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 pt-2">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card p-4">
                <div class="d-flex align-items-center mb-4 border-bottom border-success pb-3">
                    <i class="fa-solid fa-lock text-success fs-1 me-3"></i>
                    <div>
                        <h2 class="card-title mb-0">Caesar Cipher</h2>
                        <span class="text-muted small">Shift substitution algorithm</span>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="input-text" class="form-label">Message Text</label>
                    <textarea class="form-control" id="input-text" rows="4" placeholder="Enter text to encrypt/decrypt..."></textarea>
                </div>

                <div class="row mb-4 align-items-end">
                    <div class="col-md-6">
                        <label for="key" class="form-label">Shift Key (Integer)</label>
                        <input type="number" class="form-control" id="key" placeholder="e.g. 3">
                    </div>
                    <div class="col-md-6 mt-3 mt-md-0 d-flex gap-2">
                        <button class="btn btn-primary flex-grow-1" onclick="processCipher('caesar', 'encrypt')">
                            <i class="fa-solid fa-lock me-2"></i>Encrypt
                        </button>
                        <button class="btn btn-secondary flex-grow-1" onclick="processCipher('caesar', 'decrypt')">
                            <i class="fa-solid fa-unlock me-2"></i>Decrypt
                        </button>
                    </div>
                </div>

                <div>
                    <label for="output-text" class="form-label">Result</label>
                    <textarea class="form-control" id="output-text" rows="4" readonly placeholder="Result will appear here..."></textarea>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
